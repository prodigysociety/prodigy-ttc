<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | PRODIGY SOCIETY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    <div id="cursor-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <header class="glass-nav">
        <a href="index.html" class="nav-brand">
            <img src="assets/logo.png" alt="Prodigy Logo" class="nav-logo">
            <span class="nav-title">PRODIGY SOCIETY</span>
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="members.html">Members</a>
            <a href="events.html">Events</a>
            <a href="gallery.html">Gallery</a>
            <a href="achievements.html">Achievements</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="hamburger"><i class="fa-solid fa-bars"></i></div>
    </header>

    <main style="padding: 140px 8% 60px; max-width: 1200px; margin: 0 auto;">
        <h1 style="font-family: var(--font-heading); font-size: 2.5rem; text-transform: uppercase; margin-bottom: 40px; text-align: center;">Contact Society</h1>

        <div class="glass-card" style="padding: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
            <div>
                <h3 style="font-family: var(--font-heading); font-size: 1.4rem; margin-bottom: 20px;">Address & Info</h3>
                <p style="color: var(--text-muted); margin-bottom: 12px;"><i class="fa-solid fa-graduation-cap" style="color: var(--primary);"></i> Tilottama Campus</p>
                <p style="color: var(--text-muted); margin-bottom: 12px;"><i class="fa-solid fa-location-dot" style="color: var(--accent);"></i> Tilottama-2, Yogikuti, Rupandehi, Nepal</p>
                <p style="color: var(--text-muted); margin-bottom: 20px;"><i class="fa-solid fa-envelope" style="color: var(--primary);"></i> drewthecrewttc@gmail.com</p>

                <iframe style="width: 100%; height: 200px; border-radius: 12px; border: 1px solid var(--glass-border);" src="https://maps.google.com/maps?q=Tilottama%20Campus%20Yogikuti%20Rupandehi&t=&z=15&ie=UTF8&iwloc=&output=embed" frameborder="0" scrolling="no"></iframe>
            </div>

            <form onsubmit="event.preventDefault(); alert('Message Sent!');">
                <h3 style="font-family: var(--font-heading); font-size: 1.4rem; margin-bottom: 20px;">Send a Message</h3>
                <div style="margin-bottom: 15px;">
                    <input type="text" placeholder="Your Name" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; outline: none;">
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="email" placeholder="Your Email" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; outline: none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <textarea rows="4" placeholder="Your Message" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; outline: none;"></textarea>
                </div>
                <button type="submit" class="btn-neon" style="width: 100%; justify-content: center; border: none; cursor: pointer;">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom"><p>&copy; 2026 PRODIGY SOCIETY. All Rights Reserved.</p></div>
    </footer>

    <script src="js/loader.js"></script>
    <script src="js/cursor.js"></script>
    <script src="js/threeScene.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
